<!doctype html>
<html lang="en">
  <head>
    <!-- <meta name="color-scheme" content="light dark only" /> -->
    <meta name="color-scheme" content="light dark" />

    <meta charset="UTF-8" />
   

    <script>
  (function() {
    // 1. تحديد السمة (يدوياً أو حسب النظام)
    var theme = localStorage.getItem('site-theme');
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);

    // 2. تغيير meta color-scheme ليطابق السمة الفعلية
    var meta = document.querySelector('meta[name="color-scheme"]');
    if (meta) {
      meta.setAttribute('content', theme);   // يصبح "dark" أو "light" فقط
    }
  })();
</script>
