<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--Start DarkMod -->
    <!-- ========== إعدادات السمة الفورية (قبل أي رسم) ========== -->
<script>
  (function() {
    // 1. تحديد السمة: اختيار المستخدم > إعداد النظام
    var theme = localStorage.getItem('site-theme');
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);

    // 2. إعدادات فورية تمنع تدخل Samsung Internet
    if (theme === 'dark') {
      // إخبار المتصفح بأن الصفحة داكنة فعلاً (يمنع الفلتر القسري)
      document.documentElement.style.colorScheme = 'dark';
      document.documentElement.style.backgroundColor = '#121212'; // خلفية داكنة فورية
      document.documentElement.style.color = '#E9ECEF';           // نص فوري بلونك
    } else {
      document.documentElement.style.colorScheme = 'light';
      document.documentElement.style.backgroundColor = '#F8F9FA';
      document.documentElement.style.color = '#212529';
    }
    // تعطيل أي فلتر إضافي
    document.documentElement.style.forcedColorAdjust = 'none';

    // 3. إنشاء meta color-scheme ديناميكي
    var meta = document.createElement('meta');
    meta.name = 'color-scheme';
    meta.content = theme; // 'dark' أو 'light'
    document.head.prepend(meta); // يُدرَج قبل أي شيء آخر
  })();
</script>

<!-- ========== منع الوميض أثناء تحميل CSS ========== -->
<style id="anti-flash">
  /* قواعد مؤقتة تُطبق فوراً لمنع ظهور الخلفية الفاتحة */
  html { background-color: var(--bg-primary, #121212); color: var(--text-primary, #E9ECEF); }
  /* هذه المتغيرات ستعمل لأننا وضعناها ك inline style أعلاه، 
     لكن في حال عدم دعمها نكرر الألوان مباشرة */
</style>

<!-- الآن تأتي روابط الخطوط وملف CSS الرئيسي -->
    <!--End DarkMod -->

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="author" content="Almalih Motors" />
    <meta name="robots" content="index, follow" />
    <title>CarShowRoom - وجهتك الأولى لشراء السيارات</title>
    <meta
      name="description"
      content="أفضل الأسعار وأحدث موديلات السيارات في سوريا"
    />
    <script type="speculationrules">
      {
        "prefetch": [
          {
            "source": "list",
            "urls": ["/allCar", "/Whoarewe", "/Contact"]
          }
        ],
        "prerender": [
          {
            "source": "document",
            "where": {
              "or": [
                { "selector_matches": ".TagNavBar a" },
                { "selector_matches": ".Link a" },
                { "selector_matches": ".SearchNew" },
                { "selector_matches": ".ditalsCar a" },
                { "selector_matches": ".CardCar a" },
                { "selector_matches": ".related-car-card" },
                { "selector_matches": ".CardPartOne" },
                { "selector_matches": ".CardBodyType" },
                { "selector_matches": ".NavBarContiner a" }
              ]
            },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
    <script>
  window.addEventListener("pagehide", function(event) {
    if (!event.persisted) {
      localStorage.removeItem("site-theme");
    }
  });
</script>
  </head>
  <body>
    <div id="root"></div>

</html>
