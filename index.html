<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script>
      (function () {
        // ---- الكشف عن forced dark mode ----
        var testDiv = document.createElement("div");
        testDiv.style.cssText =
          "position:absolute;top:-999px;width:1px;height:1px;background:#ffffff;color:#ffffff;";
        document.body.appendChild(testDiv);
        var compStyle = getComputedStyle(testDiv);
        var bgColor = compStyle.backgroundColor;
        var textColor = compStyle.color;
        document.body.removeChild(testDiv);

        // دالة لتحويل rgb إلى hex للمقارنة
        function rgbToHex(rgb) {
          if (!rgb || rgb === "rgba(0, 0, 0, 0)") return "";
          var nums = rgb.match(/\d+/g);
          if (!nums || nums.length < 3) return "";
          return (
            "#" +
            nums
              .slice(0, 3)
              .map(function (x) {
                var hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
              })
              .join("")
          );
        }

        var bgHex = rgbToHex(bgColor);
        var textHex = rgbToHex(textColor);
        var expectedWhite = "#ffffff";

        // forced dark mode مفعّل إذا تغير لون الخلفية أو النص عن الأبيض بشكل كبير
        var forcedDark =
          bgHex.toLowerCase() !== expectedWhite ||
          textHex.toLowerCase() !== expectedWhite;
        // -----------------------------------

        var theme = localStorage.getItem("site-theme");

        if (forcedDark) {
          // المتصفح يفرض وضعًا داكنًا، نلغي أي تفضيل فاتح ونستخدم الداكن فقط
          theme = "dark";
          // نمنع المستخدم من الحفظ اليدوي للفاتح عبر إزالة أي قيمة قديمة
          localStorage.setItem("site-theme", "dark");
          // نجعل الـ meta dark only
          var meta = document.createElement("meta");
          meta.name = "color-scheme";
          meta.content = "dark only";
          document.head.appendChild(meta);
          // نخفي زر التبديل لاحقًا عبر CSS متغير (سنضيف class)
          document.documentElement.classList.add("forced-dark-active");
        } else {
          // الحالة الطبيعية
          if (!theme) {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          // إنشاء meta عادي
          var meta = document.createElement("meta");
          meta.name = "color-scheme";
          meta.content = theme;
          document.head.appendChild(meta);
        }

        document.documentElement.setAttribute("data-theme", theme);

        // خلفية طارئة لمنع الوميض
        if (theme === "dark") {
          document.documentElement.style.setProperty(
            "background-color",
            "#121212",
            "important"
          );
          document.documentElement.style.setProperty(
            "color",
            "#ffffff",
            "important"
          );
        }

        // استجابة لتغييرات النظام
        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", function (e) {
            if (forcedDark) return; // لا نغير شيء في forced dark
            if (!localStorage.getItem("site-theme")) {
              var newTheme = e.matches ? "dark" : "light";
              document.documentElement.setAttribute("data-theme", newTheme);
              var metaTag = document.querySelector('meta[name="color-scheme"]');
              if (metaTag) metaTag.content = newTheme;
            }
          });
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/logo-car.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="author" content="Almalih Motors" />
    <meta name="robots" content="index, follow" />
    <title>Almalih Motors - وجهتك الأولى لشراء السيارات</title>
    <meta
      name="description"
      content="أفضل الأسعار وأحدث موديلات السيارات في سوريا"
    />
    <script type="speculationrules">
      {
        "prefetch": [
          {
            "source": "list",
            "urls": ["/allCar", "/Whoarewe", "/Contact"]
          }
        ],
        "prerender": [
          {
            "source": "document",
            "where": {
              "or": [
                { "selector_matches": ".TagNavBar a" },
                { "selector_matches": ".Link a" },
                { "selector_matches": ".SearchNew" },
                { "selector_matches": ".ditalsCar a" },
                { "selector_matches": ".CardCar a" },
                { "selector_matches": ".related-car-card" },
                { "selector_matches": ".CardPartOne" },
                { "selector_matches": ".CardBodyType" },
                { "selector_matches": ".NavBarContiner a" }
              ]
            },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
